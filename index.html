<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <!-- Styles CSS -->
    <link rel="stylesheet" href="./assets/css/style.css" />

    <!-- Javascript -->
    <script src="./assets/js/script.js" defer></script>

    <title>Frontend Mentor | Password generator app</title>
  </head>

  <body>
    <main>
      <article class="container">
        <h1 class="title">Password Generator</h1>

        <!-- GENERATOR -->
        <div class="generator">
          <!-- DISPLAY PASSWORD -->
          <div class="password">
            <input type="text" placeholder="P4$5W0rD!" />
            <a href=""><img src="./assets/images/icon-copy.svg" alt="" /></a>
          </div>

          <div class="options">
            <!-- CHOOSE LENGHT PASSWORD -->
            <div class="option__cursor">
              <div class="option__label-cursor">
                <label for="cursor">Character Length</label>
                <span class="cursor__value" id="cursor-value">0</span>
              </div>
              <input
                type="range"
                name="cursor"
                id="cursor"
                min="0"
                max="100"
                value="0"
              />
            </div>

            <!-- CHOOSE CHARACTERS TYPES PASSWORD -->
            <div class="option__char">
              <div class="choices">
                <!-- UPPERCASE -->
                <div class="checkbox__choice">
                  <input type="checkbox" name="upp" id="upp" value="upp" />
                  <label for="upp">
                    <span class="box"></span>
                    <span class="text">Include Uppercase Letters</span>
                  </label>
                </div>
                <!-- LOWERCASE -->
                <div class="checkbox__choice">
                  <input type="checkbox" name="low" id="low" value="low" />
                  <label for="low">
                    <span class="box"></span>
                    <span class="text">Include Lowercase Letters</span>
                  </label>
                </div>
                <!-- NUMBERS -->
                <div class="checkbox__choice">
                  <input type="checkbox" name="num" id="num" value="num" />
                  <label for="num">
                    <span class="box"></span>
                    <span class="text">Include Numbers</span>
                  </label>
                </div>
                <!-- SYMBOLS -->
                <div class="checkbox__choice">
                  <input type="checkbox" name="sym" id="sym" value="sym" />
                  <label for="sym">
                    <span class="box"></span>
                    <span class="text">Include Symbols</span>
                  </label>
                </div>
              </div>
            </div>

            <!-- STRENGHT -->
            <div class="strenght__content">
              <div class="strenght">
                <h2 class="strenght__title">STRENGHT</h2>
                <div class="strenght__level">
                  <p class="strenght__text">MEDIUM</p>
                  <div class="bars">
                    <!-- TOO WEAK -->
                    <div class="bar bar__too-weak"></div>
                    <!-- WEAK -->
                    <div class="bar bar__weak"></div>
                    <!-- MEDIUM -->
                    <div class="bar bar__medium"></div>
                    <!-- STRONG -->
                    <div class="bar bar__strong"></div>
                  </div>
                </div>
              </div>

              <!-- GENERATE BUTTON -->
              <div class="btn__generate">
                <button class="btn">
                  <span>GENERATE</span>
                  <img src="./assets/images/icon-arrow-to-left.svg" alt="" />
                </button>
              </div>
            </div>
          </div>
        </div>
      </article>
    </main>
  </body>
</html>
