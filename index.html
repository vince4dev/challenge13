<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <!-- Styles CSS -->
    <link rel="stylesheet" href="./assets/css/style.css" />

    <!-- Javascript -->
    <script src="./assets/js/script.js" defer></script>

    <title>Frontend Mentor | Password generator app</title>
  </head>

  <body>
    <main>
      <article class="container">
        <h1 class="title">Password Generator</h1>

        <!-- GENERATOR -->
        <div class="generator">
          <!-- DISPLAY PASSWORD -->
          <div class="password">
            <input
              id="password-value"
              type="text"
              placeholder="P4$5W0rD!"
              readonly
            />
            <div class="icon-copy__content">
              <span class="copied">COPIED</span>
              <a href="" id="btn-copy">
                <svg
                  class="icon-copy"
                  viewBox="0 0 21 24"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M20.341 3.091 17.909.659A2.25 2.25 0 0 0 16.319 0H8.25A2.25 2.25 0 0 0 6 2.25V4.5H2.25A2.25 2.25 0 0 0 0 6.75v15A2.25 2.25 0 0 0 2.25 24h10.5A2.25 2.25 0 0 0 15 21.75V19.5h3.75A2.25 2.25 0 0 0 21 17.25V4.682a2.25 2.25 0 0 0-.659-1.591ZM12.469 21.75H2.53a.281.281 0 0 1-.281-.281V7.03a.281.281 0 0 1 .281-.281H6v10.5a2.25 2.25 0 0 0 2.25 2.25h4.5v1.969a.282.282 0 0 1-.281.281Zm6-4.5H8.53a.281.281 0 0 1-.281-.281V2.53a.281.281 0 0 1 .281-.281H13.5v4.125c0 .621.504 1.125 1.125 1.125h4.125v9.469a.282.282 0 0 1-.281.281Zm.281-12h-3v-3h.451c.075 0 .147.03.2.082L18.667 4.6a.283.283 0 0 1 .082.199v.451Z"
                    fill="currentColor"
                  />
                </svg>
              </a>
            </div>
          </div>

          <div class="options">
            <!-- CHOOSE LENGHT PASSWORD -->
            <div class="option__cursor">
              <div class="option__label-cursor">
                <label for="cursor">Character Length</label>
                <span class="cursor__value" id="cursor-value">12</span>
              </div>
              <input
                type="range"
                name="cursor"
                id="cursor"
                min="1"
                max="128"
                value="12"
              />
            </div>

            <!-- CHOOSE CHARACTERS TYPES PASSWORD -->
            <div class="option__char">
              <div class="choices">
                <!-- UPPERCASE -->
                <div class="checkbox__choice">
                  <input type="checkbox" id="check-upp" value="upp" checked />
                  <label for="check-upp">
                    <span class="box"></span>
                    <span class="text">Include Uppercase Letters</span>
                  </label>
                </div>
                <!-- LOWERCASE -->
                <div class="checkbox__choice">
                  <input type="checkbox" id="check-low" value="low" />
                  <label for="check-low">
                    <span class="box"></span>
                    <span class="text">Include Lowercase Letters</span>
                  </label>
                </div>
                <!-- NUMBERS -->
                <div class="checkbox__choice">
                  <input type="checkbox" id="check-num" value="num" />
                  <label for="check-num">
                    <span class="box"></span>
                    <span class="text">Include Numbers</span>
                  </label>
                </div>
                <!-- SYMBOLS -->
                <div class="checkbox__choice">
                  <input type="checkbox" id="check-sym" value="sym" />
                  <label for="check-sym">
                    <span class="box"></span>
                    <span class="text">Include Symbols</span>
                  </label>
                </div>
              </div>
            </div>

            <!-- STRENGHT -->
            <div class="strength__content">
              <div class="strength">
                <h2 class="strength__title">STRENGHT</h2>
                <div class="strength__level">
                  <p id="strength-text" class="strength__text">MEDIUM</p>
                  <div class="strength__bars">
                    <!-- TOO WEAK -->
                    <div class="bar" id="bar1"></div>
                    <!-- WEAK -->
                    <div class="bar" id="bar2"></div>
                    <!-- MEDIUM -->
                    <div class="bar" id="bar3"></div>
                    <!-- STRONG -->
                    <div class="bar" id="bar4"></div>
                  </div>
                </div>
              </div>

              <!-- GENERATE BUTTON -->
              <div class="btn__generate">
                <button class="btn">
                  <span>GENERATE</span>
                  <svg
                    class="icon-btn-generate"
                    width="12"
                    height="12"
                    viewBox="0 0 12 12"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                  >
                    <path
                      d="M5.10553 12L11.1055 6.00002L5.10553 0L3.84051 1.26501L7.681 5.10547L6.10352e-05 5.10547V6.8946L7.681 6.8946L3.84051 10.735L5.10553 12Z"
                      fill="currentColor"
                    />
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </article>
    </main>
  </body>
</html>
